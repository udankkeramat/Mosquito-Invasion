name: Build Game APK & AAB

on:
  push:
    branches: [ "main" ]

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install Cordova
      run: npm install -g cordova

    - name: Build Android App
      run: |
        cordova create game com.banggo.mosquito "Mosquito Invasion"
        rm -rf game/www/*
        
        # Cek otomatis folder assets & html
        if [ -d "www" ]; then
          cp -r www/* game/www/
        else
          cp index.html game/www/
          cp -r assets game/www/
        fi
        
        cp config.xml game/config.xml
        cd game
        cordova platform add android
        cordova build android --release
        
        # Build AAB untuk Play Store
        cordova build android --release -- --packageType=bundle
        
        # Buka paksa lacinya biar kita bisa lihat di log!
        echo "--- MENCARI HASIL BUILD ---"
        find platforms/android/app/build/outputs/ -type f

    - name: Upload Semua Hasil (Pasti Kena!)
      uses: actions/upload-artifact@v4
      with:
        name: Mosquito-Invasion-Android-Files
        path: game/platforms/android/app/build/outputs/
