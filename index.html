<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mosquito Invasion AR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #2c3e50; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; touch-action: none; user-select: none; }
        
        #camera-feed { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
        #game-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; }
        .interactive-canvas { pointer-events: auto !important; }

        /* UI Layers */
        #ui-layer { position: absolute; inset: 0; z-index: 10; pointer-events: none; display: flex; flex-direction: column; }
        .menu-screen { position: absolute; inset: 0; background: rgba(30, 41, 59, 0.85); backdrop-filter: blur(8px); display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: auto; transition: opacity 0.3s ease; }
        .hidden { opacity: 0; pointer-events: none; z-index: -1; }

        /* Buttons & Panels */
        .panel { background: white; padding: 2rem; border-radius: 1.5rem; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.5); border: 4px solid #facc15; max-width: 90%; width: 350px; }
        .btn { display: block; width: 100%; padding: 1rem; margin-top: 1rem; border-radius: 999px; font-weight: 900; font-size: 1.25rem; text-transform: uppercase; cursor: pointer; transition: transform 0.1s, filter 0.1s; border: none; }
        .btn:active { transform: translateY(4px); }
        .btn-primary { background: linear-gradient(to bottom, #fde047, #eab308); color: #854d0e; box-shadow: 0 6px 0 #ca8a04; }
        .btn-secondary { background: linear-gradient(to bottom, #93c5fd, #3b82f6); color: white; box-shadow: 0 6px 0 #2563eb; }
        .btn-danger { background: linear-gradient(to bottom, #fca5a5, #ef4444); color: white; box-shadow: 0 6px 0 #dc2626; }

        /* Splat Animation */
        .splat { position: absolute; color: #fbbf24; font-weight: 900; font-size: 2.5rem; -webkit-text-stroke: 1px #b45309; text-shadow: 0 4px 0 #b45309; z-index: 20; pointer-events: none; animation: popOut 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; transform: translate(-50%, -50%); }
        @keyframes popOut {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5) rotate(-10deg); }
            50% { opacity: 1; transform: translate(-50%, -80%) scale(1.2) rotate(5deg); }
            100% { opacity: 0; transform: translate(-50%, -100%) scale(1) rotate(0deg); }
        }
    </style>
</head>
<body>

    <video id="camera-feed" autoplay playsinline muted></video>
    
    <canvas id="game-canvas"></canvas>

    <div id="ui-layer">
        
        <div id="hud" class="hidden flex justify-between p-4 w-full">
            <div class="bg-white/90 px-5 py-2 rounded-2xl border-4 border-yellow-400 font-black text-2xl text-orange-600 shadow-lg">
                ⭐ <span id="score">0</span>
            </div>
            <div class="bg-white/90 px-5 py-2 rounded-2xl border-4 border-blue-400 font-black text-2xl text-blue-600 shadow-lg">
                ⏱️ <span id="time">60</span>
            </div>
        </div>

        <div id="menu-main" class="menu-screen">
            <div class="panel">
                <div class="text-6xl mb-4">🦟</div>
                <h1 class="text-3xl font-black text-orange-500 mb-1 leading-tight">MOSQUITO<br>INVASION</h1>
                <p class="text-gray-500 font-bold mb-6">AR Arcade Shooter</p>
                <button onclick="changeState('playing')" class="btn btn-primary">▶ Play Game</button>
                <button onclick="changeState('help')" class="btn btn-secondary">❓ Cara Main</button>
            </div>
        </div>

        <div id="menu-help" class="menu-screen hidden">
            <div class="panel text-left">
                <h2 class="text-2xl font-black text-blue-600 mb-4 text-center">CARA MAIN</h2>
                <ul class="space-y-3 text-gray-700 font-medium mb-6">
                    <li>📱 <strong>Gerakkan HP-mu</strong> ke segala arah untuk mencari nyamuk di sekitarmu.</li>
                    <li>👆 <strong>Tap layarmu</strong> tepat di nyamuk untuk mendapatkan skor.</li>
                    <li>⏳ Kamu hanya punya waktu <strong>60 detik</strong>. Dapatkan skor setinggi mungkin!</li>
                </ul>
                <button onclick="changeState('main')" class="btn btn-primary">⬅ Kembali</button>
            </div>
        </div>

        <div id="menu-over" class="menu-screen hidden">
            <div class="panel">
                <h1 class="text-4xl font-black text-red-500 mb-2">WAKTU HABIS!</h1>
                <p class="text-gray-600 font-bold mb-2">Total Skor Kamu:</p>
                <div class="text-6xl font-black text-orange-500 mb-6 drop-shadow-md">⭐ <span id="final-score">0</span></div>
                <button onclick="changeState('playing')" class="btn btn-primary">🔄 Main Lagi</button>
                <button onclick="changeState('main')" class="btn btn-danger">🏠 Menu Utama</button>
            </div>
        </div>

    </div>

    <script>
        // --- GAME VARIABLES ---
        let score = 0, time = 60, isPlaying = false, gameTimer;
        let scene, camera, renderer, raycaster, mouse, clock;
        let mosquitoes = [];
        let baseSpriteTexture;
        let hasGyro = false;

        // --- DOM ELEMENTS ---
        const elScore = document.getElementById('score');
        const elTime = document.getElementById('time');
        const elFinalScore = document.getElementById('final-score');
        const canvasEl = document.getElementById('game-canvas');
        
        const menus = {
            main: document.getElementById('menu-main'),
            help: document.getElementById('menu-help'),
            hud: document.getElementById('hud'),
            over: document.getElementById('menu-over')
        };

        // --- AUDIO SYSTEM ---
        const actx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(type) {
            if(actx.state === 'suspended') actx.resume();
            const osc = actx.createOscillator(), gain = actx.createGain();
            osc.connect(gain); gain.connect(actx.destination);
            const now = actx.currentTime;
            
            if(type === 'pop') { 
                osc.type = 'sine';
                osc.frequency.setValueAtTime(500, now); 
                osc.frequency.exponentialRampToValueAtTime(1000, now + 0.1); 
                gain.gain.setValueAtTime(0.5, now); 
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1); 
                osc.start(now); osc.stop(now + 0.1); 
            }
        }

        // --- GENERATE SPRITESHEET (4 Frames) ---
        // Membuat gambar nyamuk langsung dengan HTML Canvas agar bebas error CORS
        function generateMosquitoSprite() {
            const cvs = document.createElement('canvas');
            cvs.width = 512; // 4 frame x 128px
            cvs.height = 128;
            const ctx = cvs.getContext('2d');

            for (let i = 0; i < 4; i++) {
                const cx = (i * 128) + 64;
                const cy = 64;

                // Badan
                ctx.fillStyle = '#1e293b';
                ctx.beginPath(); ctx.ellipse(cx, cy + 10, 15, 25, 0, 0, Math.PI * 2); ctx.fill();
                
                // Kepala & Hidung
                ctx.beginPath(); ctx.arc(cx, cy - 20, 12, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = '#ef4444';
                ctx.fillRect(cx - 2, cy - 45, 4, 25);

                // Sayap (Animasi berdasarkan frame)
                ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
                ctx.beginPath();
                if (i === 0) { // Atas
                    ctx.ellipse(cx - 25, cy - 10, 35, 10, -Math.PI/6, 0, Math.PI*2);
                    ctx.ellipse(cx + 25, cy - 10, 35, 10, Math.PI/6, 0, Math.PI*2);
                } else if (i === 1 || i === 3) { // Tengah
                    ctx.ellipse(cx - 35, cy, 40, 8, 0, 0, Math.PI*2);
                    ctx.ellipse(cx + 35, cy, 40, 8, 0, 0, Math.PI*2);
                } else { // Bawah
                    ctx.ellipse(cx - 25, cy + 10, 35, 10, Math.PI/6, 0, Math.PI*2);
                    ctx.ellipse(cx + 25, cy + 10, 35, 10, -Math.PI/6, 0, Math.PI*2);
                }
                ctx.fill();
            }

            const texture = new THREE.CanvasTexture(cvs);
            texture.repeat.set(0.25, 1); // Hanya tampilkan 1/4 bagian (1 frame)
            return texture;
        }

        // --- CORE 3D SETUP ---
        function init3D() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ canvas: canvasEl, alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);

            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();
            clock = new THREE.Clock();

            baseSpriteTexture = generateMosquitoSprite();
            
            setupCameraFeed();
            animate();
        }

        async function setupCameraFeed() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                document.getElementById('camera-feed').srcObject = stream;
            } catch(e) {
                scene.background = new THREE.Color(0x87CEEB); // Langit jika gagal
            }
        }

        function initGyro() {
            if (hasGyro) return;
            const enable = () => {
                window.addEventListener('deviceorientation', (e) => {
                    if(!e.alpha) return;
                    let a = THREE.MathUtils.degToRad(e.alpha);
                    let b = THREE.MathUtils.degToRad(e.beta);
                    let g = THREE.MathUtils.degToRad(e.gamma);
                    camera.quaternion.setFromEuler(new THREE.Euler(b, a, -g, 'YXZ'));
                });
                hasGyro = true;
            };

            if(typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(state => { if(state === 'granted') enable(); }).catch(console.error);
            } else { enable(); }
        }

        // --- GAMEPLAY LOGIC ---
        function spawnMosquito() {
            if(!isPlaying) return;

            // Clone material agar frame animasi tiap nyamuk bisa beda-beda
            const mat = new THREE.SpriteMaterial({ map: baseSpriteTexture.clone(), color: 0xffffff });
            const sprite = new THREE.Sprite(mat);
            
            // Jarak spawn
            const radius = 25 + Math.random() * 15;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            
            sprite.position.set(radius * Math.sin(phi) * Math.cos(theta), radius * Math.cos(phi), radius * Math.sin(phi) * Math.sin(theta));
            sprite.scale.set(4, 4, 1);
            
            // Data kustom nyamuk
            sprite.userData = { 
                speed: 15 + Math.random() * 20, // Kecepatan terbang
                frame: 0, 
                animTimer: 0 
            };

            scene.add(sprite);
            mosquitoes.push(sprite);

            // Semakin sedikit waktu, semakin cepat nyamuk muncul
            let spawnDelay = Math.max(400, time * 20); 
            setTimeout(spawnMosquito, spawnDelay);
        }

        function updateMosquitoes(delta) {
            for(let i = mosquitoes.length - 1; i >= 0; i--) {
                let m = mosquitoes[i];
                
                // Terbang ke arah pemain (kamera di 0,0,0)
                let dir = new THREE.Vector3().subVectors(camera.position, m.position).normalize();
                m.position.add(dir.multiplyScalar(m.userData.speed * delta));

                // Animasi Frame (Mengepakkan sayap)
                m.userData.animTimer += delta;
                if(m.userData.animTimer > 0.05) { // Ganti frame setiap 0.05 detik
                    m.userData.frame = (m.userData.frame + 1) % 4;
                    m.material.map.offset.x = m.userData.frame * 0.25;
                    m.userData.animTimer = 0;
                }

                // Jika nyamuk menabrak pemain/terlewat, hilangkan (tidak ada minus skor/HP)
                if(m.position.distanceTo(camera.position) < 2) {
                    scene.remove(m);
                    mosquitoes.splice(i, 1);
                }
            }
        }

        // Tembak (Tap)
        canvasEl.addEventListener('pointerdown', (e) => {
            if(!isPlaying) return;
            
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            
            raycaster.setFromCamera(mouse, camera);
            const hits = raycaster.intersectObjects(mosquitoes);
            
            if(hits.length > 0) {
                const hitObj = hits[0].object;
                const idx = mosquitoes.indexOf(hitObj);
                
                if(idx > -1) {
                    score += 10; 
                    elScore.innerText = score;
                    playSound('pop');
                    
                    // Efek Teks Splat
                    let splat = document.createElement('div'); 
                    splat.className = 'splat'; 
                    splat.innerText = ['SPLAT!', 'KENA!', 'BAM!', 'NICE!'][Math.floor(Math.random()*4)];
                    splat.style.left = e.clientX + 'px'; 
                    splat.style.top = e.clientY + 'px'; 
                    document.getElementById('ui-layer').appendChild(splat);
                    setTimeout(() => splat.remove(), 600);

                    scene.remove(hitObj); 
                    mosquitoes.splice(idx, 1);
                }
            }
        });

        // --- STATE MANAGER ---
        function changeState(newState) {
            // Sembunyikan semua menu
            Object.values(menus).forEach(m => m.classList.add('hidden'));
            canvasEl.classList.remove('interactive-canvas');

            if (newState === 'main') {
                menus.main.classList.remove('hidden');
            } 
            else if (newState === 'help') {
                menus.help.classList.remove('hidden');
            } 
            else if (newState === 'playing') {
                initGyro(); // Minta izin Gyro saat klik Play
                if(actx.state === 'suspended') actx.resume();

                menus.hud.classList.remove('hidden');
                canvasEl.classList.add('interactive-canvas');
                
                // Reset Game
                score = 0; time = 60; isPlaying = true;
                elScore.innerText = score; elTime.innerText = time;
                
                mosquitoes.forEach(m => scene.remove(m));
                mosquitoes = [];
                
                spawnMosquito();
                
                clearInterval(gameTimer);
                gameTimer = setInterval(() => {
                    time--; elTime.innerText = time;
                    if(time <= 0) changeState('over');
                }, 1000);
            }
            else if (newState === 'over') {
                isPlaying = false;
                clearInterval(gameTimer);
                elFinalScore.innerText = score;
                menus.over.classList.remove('hidden');
            }
        }

        // --- MAIN LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            if(isPlaying) updateMosquitoes(delta);
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => { 
            camera.aspect = window.innerWidth / window.innerHeight; 
            camera.updateProjectionMatrix(); 
            renderer.setSize(window.innerWidth, window.innerHeight); 
        });

        // Initialize Engine on load
        window.onload = init3D;

    </script>
</body>
</html>
