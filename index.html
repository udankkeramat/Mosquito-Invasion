<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Mosquito Invasion AR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; touch-action: none; user-select: none; font-family: sans-serif; }
        #camera-feed, #game-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        #game-canvas { z-index: 10; }
        #ui { position: absolute; top: 0; z-index: 20; pointer-events: none; width: 100%; padding: 1rem; }
        .overlay { position: absolute; inset: 0; z-index: 30; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; text-align: center; padding: 2rem; pointer-events: auto; }
        .btn { background: #F59E0B; padding: 1rem 2rem; border-radius: 999px; font-weight: bold; font-size: 1.25rem; color: white; margin-top: 1rem; cursor: pointer; border: 2px solid white; transition: transform 0.1s; }
        .btn:active { transform: scale(0.95); }
        .hidden { display: none !important; }
        .splat { position: absolute; color: yellow; font-weight: bold; font-size: 2rem; text-shadow: 2px 2px red; z-index: 40; pointer-events: none; transform: translate(-50%, -50%); animation: pop 0.5s ease-out forwards; }
        @keyframes pop { 0% { transform: translate(-50%, -50%) scale(0.5); opacity: 1; } 100% { transform: translate(-50%, -100%) scale(1.5); opacity: 0; } }
        #damage { position: absolute; inset: 0; background: red; opacity: 0; z-index: 25; pointer-events: none; transition: opacity 0.2s; }
        .hurt { opacity: 0.4 !important; }
    </style>
</head>
<body>
    <video id="camera-feed" autoplay playsinline muted></video>
    <canvas id="game-canvas"></canvas>
    <div id="damage"></div>

    <div id="ui">
        <div class="flex justify-between w-full">
            <div class="bg-white/90 px-4 py-2 rounded-xl text-orange-600 font-bold text-xl border-4 border-yellow-400">⭐ <span id="score">0</span></div>
            <div class="text-right">
                <div class="bg-white/90 px-4 py-2 rounded-xl text-blue-600 font-bold text-xl mb-2 border-4 border-blue-400">⏱️ <span id="time">60</span>s</div>
                <div class="w-32 h-6 bg-red-200 rounded-full border-2 border-red-500 overflow-hidden relative"><div id="hp" class="absolute inset-y-0 left-0 bg-red-500 w-full transition-all"></div></div>
            </div>
        </div>
    </div>

    <div id="start-screen" class="overlay">
        <h1 class="text-4xl font-black text-yellow-400 mb-2">MOSQUITO INVASION</h1>
        <h2 class="text-xl mb-6 text-gray-300">AR Mosquito Edition</h2>
        <div class="bg-white/10 p-4 rounded-xl mb-6 text-left border border-white/20">
            <p class="mb-2">📱 <strong>Gerakkan HP-mu</strong> untuk memutar pandangan kamera.</p>
            <p class="mb-2">👆 <strong>Tap layar</strong> untuk menembak nyamuk.</p>
            <p>⚠️ Jangan biarkan mereka mendekat!</p>
        </div>
        <button id="btn-start" class="btn">Mulai & Beri Izin AR</button>
    </div>

    <div id="end-screen" class="overlay hidden">
        <h1 id="end-title" class="text-4xl font-black text-red-500 mb-4">GAME OVER</h1>
        <p class="text-2xl mb-6">Skor Akhir: <span id="final-score" class="text-yellow-400 font-bold">0</span></p>
        <button id="btn-restart" class="btn">Main Lagi</button>
    </div>

    <script>
        let score = 0, time = 60, hp = 100, isPlaying = false, timer;
        let scene, camera, renderer, raycaster = new THREE.Raycaster(), mouse = new THREE.Vector2(), clock = new THREE.Clock();
        let mosquitoes = [];
        
        const elScore = document.getElementById('score'), elTime = document.getElementById('time'), elHp = document.getElementById('hp');
        const uiStart = document.getElementById('start-screen'), uiEnd = document.getElementById('end-screen');
        const endTitle = document.getElementById('end-title');

        // Setup Audio Synthesizer
        const actx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(type) {
            if(actx.state === 'suspended') actx.resume();
            const osc = actx.createOscillator(), gain = actx.createGain();
            osc.connect(gain); gain.connect(actx.destination);
            const now = actx.currentTime;
            if(type === 'hit') { 
                osc.frequency.setValueAtTime(600, now); osc.frequency.exponentialRampToValueAtTime(100, now+0.1); 
                gain.gain.setValueAtTime(0.5, now); gain.gain.setTargetAtTime(0, now, 0.05); 
                osc.start(now); osc.stop(now+0.1); 
            } else { 
                osc.type = 'triangle'; osc.frequency.setValueAtTime(200, now); osc.frequency.linearRampToValueAtTime(100, now+0.2);
                gain.gain.setValueAtTime(0.5, now); gain.gain.setTargetAtTime(0, now, 0.1); 
                osc.start(now); osc.stop(now+0.2); 
            }
        }

        // Setup 3D Scene
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('game-canvas'), alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        scene.add(new THREE.AmbientLight(0xffffff, 1));

        // Setup AR Camera
        async function initCam() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                document.getElementById('camera-feed').srcObject = stream;
            } catch(e) { 
                scene.background = new THREE.Color(0x87CEEB); 
                console.warn("Kamera tidak diizinkan atau tidak tersedia.");
            }
        }

        // Setup Gyroscope
        function initGyro() {
            const enableGyro = () => {
                window.addEventListener('deviceorientation', (e) => {
                    if(!e.alpha) return;
                    let a = THREE.MathUtils.degToRad(e.alpha);
                    let b = THREE.MathUtils.degToRad(e.beta);
                    let g = THREE.MathUtils.degToRad(e.gamma);
                    // Sesuaikan orientasi untuk layar portrait
                    camera.quaternion.setFromEuler(new THREE.Euler(b, a, -g, 'YXZ'));
                });
            };

            if(typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(state => { 
                    if(state === 'granted') enableGyro(); 
                }).catch(console.error);
            } else { 
                enableGyro(); 
            }
        }

        // Model Nyamuk Sederhana
        function createMosquito() {
            const g = new THREE.Group();
            const body = new THREE.Mesh(new THREE.SphereGeometry(1, 16, 16), new THREE.MeshBasicMaterial({color: 0x2d3436}));
            const wingGeo = new THREE.PlaneGeometry(3, 1);
            const wingMat = new THREE.MeshBasicMaterial({color: 0xdfe6e9, transparent: true, opacity: 0.6, side: THREE.DoubleSide});
            const wing = new THREE.Mesh(wingGeo, wingMat);
            wing.position.y = 0.5;
            const nose = new THREE.Mesh(new THREE.ConeGeometry(0.2, 1.5, 8), new THREE.MeshBasicMaterial({color: 0xd63031}));
            nose.rotation.x = Math.PI / 2; nose.position.z = 1;
            
            g.add(body); g.add(wing); g.add(nose);
            g.userData = { wing, speed: 0.05 + Math.random()*0.05, wobble: Math.random()*100 };
            g.scale.set(0.6, 0.6, 0.6);
            return g;
        }

        function spawn() {
            if(!isPlaying) return;
            const m = createMosquito();
            // Spawn acak dalam radius bola di sekitar pemain
            const r = 30 + Math.random()*20;
            const theta = Math.random()*Math.PI*2;
            const phi = Math.acos(2*Math.random()-1);
            
            m.position.set(r*Math.sin(phi)*Math.cos(theta), r*Math.cos(phi), r*Math.sin(phi)*Math.sin(theta));
            scene.add(m); 
            mosquitoes.push(m);
            setTimeout(spawn, Math.max(800, 2000 - score*40));
        }

        function updateLoop() {
            requestAnimationFrame(updateLoop);
            const time = clock.getElapsedTime();
            if(isPlaying) {
                for(let i=mosquitoes.length-1; i>=0; i--) {
                    let m = mosquitoes[i];
                    m.lookAt(camera.position);
                    // Gerak mendekat + sedikit goyang
                    m.position.add(new THREE.Vector3().subVectors(camera.position, m.position).normalize().multiplyScalar(m.userData.speed));
                    m.position.y += Math.sin(time * 3 + m.userData.wobble) * 0.05;
                    m.userData.wing.rotation.x = Math.sin(time * 50);

                    // Jarak gigitan
                    if(m.position.distanceTo(camera.position) < 3.5) {
                        scene.remove(m); mosquitoes.splice(i,1);
                        hp -= 15; elHp.style.width = Math.max(0,hp)+'%'; playSound('hurt');
                        document.getElementById('damage').classList.add('hurt');
                        setTimeout(()=>document.getElementById('damage').classList.remove('hurt'), 200);
                        if(hp <= 0) gameOver("TERLALU BANYAK DIGIGIT!");
                    }
                }
            }
            renderer.render(scene, camera);
        }

        // Deteksi Tembakan (Tap)
        document.getElementById('game-canvas').addEventListener('pointerdown', (e) => {
            if(!isPlaying) return;
            mouse.x = (e.clientX / window.innerWidth)*2 - 1;
            mouse.y = -(e.clientY / window.innerHeight)*2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const hits = raycaster.intersectObjects(mosquitoes, true);
            
            if(hits.length > 0) {
                let hitObj = hits[0].object;
                while (hitObj.parent && hitObj.parent.type === 'Group') { hitObj = hitObj.parent; }
                const idx = mosquitoes.indexOf(hitObj);
                if(idx > -1) {
                    score += 5; elScore.innerText = score; playSound('hit');
                    let splat = document.createElement('div'); splat.className = 'splat'; splat.innerText = 'Kena!';
                    splat.style.left = e.clientX+'px'; splat.style.top = e.clientY+'px'; document.body.appendChild(splat);
                    setTimeout(()=>splat.remove(), 500);
                    scene.remove(hitObj); mosquitoes.splice(idx, 1);
                }
            }
        });

        // Kontrol Permainan
        function start() {
            if(actx.state === 'suspended') actx.resume();
            initCam(); 
            initGyro();
            score = 0; time = 60; hp = 100; isPlaying = true;
            elScore.innerText = score; elTime.innerText = time; elHp.style.width = '100%';
            uiStart.classList.add('hidden'); uiEnd.classList.add('hidden');
            mosquitoes.forEach(m => scene.remove(m)); mosquitoes = [];
            spawn();
            clearInterval(timer);
            timer = setInterval(() => { 
                time--; elTime.innerText = time; 
                if(time<=0) gameOver("WAKTU HABIS!"); 
            }, 1000);
        }

        function gameOver(reason) {
            isPlaying = false; clearInterval(timer);
            endTitle.innerText = reason;
            document.getElementById('final-score').innerText = score;
            uiEnd.classList.remove('hidden');
        }

        // Listener & Boot
        document.getElementById('btn-start').addEventListener('click', start);
        document.getElementById('btn-restart').addEventListener('click', start);
        window.addEventListener('resize', () => { 
            camera.aspect = window.innerWidth/window.innerHeight; 
            camera.updateProjectionMatrix(); 
            renderer.setSize(window.innerWidth, window.innerHeight); 
        });
        updateLoop();
    </script>
</body>
</html>
