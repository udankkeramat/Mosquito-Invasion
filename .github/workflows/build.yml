name: Build Game APK

on:
  push:
    branches: [ "main" ]

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
    - name: Ambil File
      uses: actions/checkout@v4

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Setup Java (Versi 11 Paling Stabil!)
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '11'

    - name: Install Cordova Anti-Nyangkut
      run: |
        npm install -g cordova
        cordova telemetry off

    - name: Merakit APK Android
      run: |
        cordova create game com.banggo.mosquito "MosquitoInvasion"
        rm -rf game/www/*
        
        # Pindahkan kodemu yang udah rapi itu
        cp -r www/* game/www/
        cp config.xml game/config.xml
        
        cd game
        # Install mesin Android versi paling stabil
        cordova platform add android@12.0.1
        
        # Build pakai mode cerewet! (--verbose)
        cordova build android --debug --verbose

    - name: Kirim APK ke Bosku!
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: Mosquito-Invasion-APK
        path: game/platforms/android/**/*.apk
